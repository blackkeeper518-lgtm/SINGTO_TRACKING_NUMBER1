<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SINGTO | COMMAND CENTER V47.0</title>
  
  <!-- 🌐 [AUTHORITY]: DARKSTOF Only - เปลี่ยนมาใช้ลิงก์คลังแสง CDN ตัวเสถียรที่สุดในโลก ไม่มืดแน่นอน -->
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>
  <script src="https://tailwindcss.com"></script>
  <script src="https://jsdelivr.net"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  
  <style>
    :root { --neon-orange: #ff6600; --dark-bg: #0D0800; }
    body { background-color: var(--dark-bg); color: white; font-family: 'Bai Jamjuree', sans-serif; overflow-x: hidden; }
    .cyber-font { font-family: 'Orbitron', sans-serif; }
    .glass-panel { background: rgba(26, 17, 0, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 102, 0, 0.25); }
    .neon-glow { text-shadow: 0 0 10px var(--neon-orange), 0 0 20px var(--neon-orange); }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    .neon-border { position: relative; border: 2px solid transparent; border-image: conic-gradient(from var(--angle), transparent 60%, var(--neon-orange), #fff) 1; animation: rotateAngle 2s linear infinite; }
    @keyframes rotateAngle { to { --angle: 360deg; } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-orange); border-radius: 10px; }
    .btn-active { background: var(--neon-orange); box-shadow: 0 0 35px var(--neon-orange); color: white; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const SUPABASE_URL = "https://xbwcuifizktwubsymscs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhid2N1aWZpemt0d3Vic3ltc2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTg1NjgsImV4cCI6MjA5NzQ3NDU2OH0.qD0Kc-XVjanJekwyp5Dh00MJKf6T76MC6YqBvgYfLvc";
    const MASTER_PASS = "1234";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [activeTab, setActiveTab] = useState("tracking");
      const [password, setPassword] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);
      const [phoneInput, setPhoneInput] = useState("");
      const [trackingData, setTrackingData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);

      const cleanName = (name) => {
        if (!name) return "ลูกค้า VIP 💎";
        const cleaned = String(name).replace(/^[0-9\s\.\-\/]+/, "");
        return cleaned.trim() !== "" ? cleaned : String(name);
      };

      const handleSearch = async () => {
        let cleanPhone = phoneInput.replace(/[^0-9]/g, "");
        if (cleanPhone.startsWith("660")) {
          cleanPhone = cleanPhone.substring(2);
        } else if (cleanPhone.startsWith("66") && cleanPhone.length > 10) {
          cleanPhone = "0" + cleanPhone.substring(2);
        } else if (cleanPhone.length === 9 && ["6", "8", "9"].includes(cleanPhone.charAt(0))) {
          cleanPhone = "0" + cleanPhone;
        }

        if (cleanPhone.length < 9) {
          alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง");
          return;
        }

        setLoading(true);
        setTrackingData(null);

                    setLoading(true);
        setTrackingData(null);

        try {
          // 🚀 ดึงข้อมูลตรงๆ จากตารางใหม่ (parcels) แบบปลอดภัย ไร้ภาษาไทยปน ป้องกันจอมืด 100%
          const { data, error } = await supabase
            .from("parcels")
            .select("customer, track, cod, is_phone_valid")
            .eq("phone", cleanPhone)
            .order("created_at", { ascending: false })
            .maybeSingle();

          if (data) {
            setTrackingData(data);
          } else {
            alert("ไม่พบข้อมูลพัสดุในระบบ SINGTO STORE");
          }
          if (error) throw error;
        } catch (err) {
          console.error(err);
          alert("ระบบเชื่อมต่อขัดข้อง กรุณาลองใหม่อีกครั้ง");
        } finally {
          setLoading(false);
        }
      };


      return (
        <main className="min-h-screen flex flex-col items-center justify-center p-4 relative">
          <div className="text-center mb-8">
            <h1 className="text-6xl font-black bg-gradient-to-r from-white via-[#FFD700] to-white bg-clip-text text-transparent drop-shadow-[0_0_20px_rgba(255,140,0,0.8)] leading-tight cyber-font">
              SINGTO
            </h1>
            <p className="text-xl font-bold text-white tracking-widest uppercase italic mt-1">✧บุหรี่นอกราคาส่ง✧</p>
          </div>

          <div className="flex gap-2 mb-6 w-full max-w-md">
            <button onClick={() => setActiveTab("tracking")} className={`flex-1 py-3 rounded-xl font-bold border border-white/10 ${activeTab === "tracking" ? "btn-active" : "bg-white/5 text-gray-400"}`}>
              📦 ค้นหาพัสดุ
            </button>
            <button onClick={() => setActiveTab("command")} className={`flex-1 py-3 rounded-xl font-bold border border-white/10 ${activeTab === "command" ? "btn-active" : "bg-white/5 text-gray-400"}`}>
              ⚡ COMMAND CENTER
            </button>
          </div>

          <div className="w-full max-w-md">
            {activeTab === "tracking" && (
              <div className="space-y-6">
                <input type="tel" value={phoneInput} onChange={(e) => setPhoneInput(e.target.value)} placeholder="กรอกเบอร์โทรศัพท์" className="w-full p-5 text-center text-2xl bg-white/5 border border-white/20 rounded-2xl text-white outline-none focus:border-[#FF6600]" />
                <button onClick={handleSearch} className="relative w-full py-5 rounded-2xl font-black text-xl text-white overflow-hidden shadow-2xl bg-orange-600">
                  <span>{loading ? "กำลังค้นหา..." : "เช็คเลขพัสดุ"}</span>
                </button>

                {trackingData && (
                  <div className="p-5 bg-white/5 border border-white/10 rounded-2xl text-center space-y-4">
                    <h2 className="text-2xl text-white font-black">{cleanName(trackingData.customer)}</h2>
                    <p className="text-xl font-mono text-orange-400 font-bold">{trackingData.track}</p>
                    <p className="text-4xl text-white font-black">฿{Number(trackingData.cod).toLocaleString()}</p>
                  </div>
                )}
              </div>
            )}

            {activeTab === "command" && (
              <div className="glass-panel p-6 rounded-2xl border border-white/10 text-center space-y-4">
                <h3 className="text-lg font-bold text-orange-400 cyber-font">🛡️ SECURITY ACCESS</h3>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="ENTER PASSWORD" className="w-full p-4 text-center bg-black/40 border border-white/10 rounded-xl text-white" />
                <button onClick={() => password === MASTER_PASS ? setIsAuthed(true) : alert("รหัสผิด!")} className="w-full py-3 btn-active rounded-xl font-bold">ACCESS</button>
              </div>
            )}
          </div>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
