<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SINGTO | COMMAND CENTER V47.0</title>
  
  <!-- 🌐 [AUTHORITY]: DARKSTOF Only - CDN ปลั๊กอินระบบทั้งหมด -->
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://tailwindcss.com"></script>
  <script src="https://unpkg.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  
  <!-- 🎨 [DESIGN]: ล็อกสเปกแสงสีนีออน ส้ม-ทอง แอนิเมชันเดิมของเชฟ 100% -->
  <style>
    :root { --neon-orange: #ff6600; --dark-bg: #0D0800; }
    body { background-color: var(--dark-bg); color: white; font-family: 'Bai Jamjuree', sans-serif; overflow-x: hidden; }
    .cyber-font { font-family: 'Orbitron', sans-serif; }
    .glass-panel { background: rgba(26, 17, 0, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 102, 0, 0.25); }
    .neon-glow { text-shadow: 0 0 10px var(--neon-orange), 0 0 20px var(--neon-orange); }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    .neon-border { position: relative; border: 2px solid transparent; border-image: conic-gradient(from var(--angle), transparent 60%, var(--neon-orange), #fff) 1; animation: rotateAngle 2s linear infinite; }
    @keyframes rotateAngle { to { --angle: 360deg; } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-orange); border-radius: 10px; }
    .btn-active { background: var(--neon-orange); box-shadow: 0 0 35px var(--neon-orange); color: white; }
    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- ⚙️ [SYSTEM LOGIC]: ท่อนสคริปต์สมองกลอัจฉริยะ -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔒 [UPDATED CONFIG]: เชื่อมต่ออาณาจักรหลังบ้าน Supabase ตัวใหม่ของเชฟ
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_KEY = "sb_publishable__jf6STEu_EO57bk21V4MXw_MFLkBbHu";
    const MASTER_PASS = "1234";

    // สร้างระบบเรียกใช้ฐานข้อมูล
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [activeTab, setActiveTab] = useState("tracking"); // หน้าเริ่มต้น
      const [password, setPassword] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);
      
      // ตัวแปรฝั่งเช็คพัสดุ
      const [phoneInput, setPhoneInput] = useState("");
      const [trackingData, setTrackingData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);

      // ฟังก์ชันล้างเศษขยะหน้าชื่อ (เช่น "1. นายสิงโต" -> "นายสิงโต")
      const cleanName = (name) => {
        if (!name) return "ลูกค้า VIP 💎";
        const cleaned = String(name).replace(/^[0-9\s\.\-\/]+/, "");
        return cleaned.trim() !== "" ? cleaned : String(name);
      };

      // 🔍 [SMART SEARCH]: ฟังก์ชันสกัดเบอร์วิบัติ + ยิงหาฟังก์ชันลับ RPC
      const handleSearch = async () => {
        // 1. ดักจับและล้างสิ่งแปลกปลอม (ขีด, จุด, ช่องว่าง, วงเล็บ) ในฝั่งหน้าบ้านก่อนทันที
        let cleanPhone = phoneInput.replace(/[^0-9]/g, "");

        // 2. ตรรกะดัดเบอร์สากล 66 และเติมเลข 0 นำหน้ากรณีโดน Excel กินข้อมูล
        if (cleanPhone.startsWith("660")) {
          cleanPhone = cleanPhone.substring(2);
        } else if (cleanPhone.startsWith("66") && cleanPhone.length > 10) {
          cleanPhone = "0" + cleanPhone.substring(2);
        } else if (cleanPhone.length === 9 && ["6", "8", "9"].includes(cleanPhone.charAt(0))) {
          cleanPhone = "0" + cleanPhone;
        }

        // ดักความยาวเบอร์โทรขั้นต่ำ (เบอร์บ้านไทย 9 หลัก)
        if (cleanPhone.length < 9) {
          alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง");
          return;
        }

        setLoading(true);
        setTrackingData(null);

        try {
          // 🚀 3. เปลี่ยนมายิงคำสั่งผ่าน ฟังก์ชันลับ RPC หลังบ้าน ปลอดภัยเหนียวแน่น 100% ไม่โดนขโมยข้อมูลดึงเหมาเข่ง
          const { data, error } = await supabase
            .rpc("get_parcel_by_phone", { search_phone: cleanPhone })
            .maybeSingle();

          if (data) {
            setTrackingData(data);
          } else {
            alert("ไม่พบข้อมูลพัสดุในระบบ SINGTO STORE");
          }
          if (error) throw error;
        } catch (err) {
          console.error(err);
          alert("ระบบเชื่อมต่อขัดข้อง กรุณาลองใหม่อีกครั้ง");
        } finally {
          setLoading(false);
        }
      };

      // ตรวจสอบรหัสผ่านแผงควบคุมระบบ (รหัส 1234)
      const handleAuth = () => {
        if (password === MASTER_PASS) {
          setIsAuthed(true);
        } else {
          alert("รหัสผ่านไม่ถูกต้อง!");
          setPassword("");
        }
      };

      return (
        <main className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
          {/* Background แสงสีจางๆ ด้านหลัง */}
          <div className="absolute inset-0 bg-gradient-to-br from-[#1a1100] via-[#0D0800] to-black -z-10" />
          <div className="absolute top-[-5%] right-[-5%] w-[450px] h-[450px] bg-[#FF8C00] opacity-[0.12] blur-[100px] rounded-full -z-10" />
          <div className="absolute bottom-[-5%] left-[-5%] w-[350px] h-[350px] bg-[#FFD700] opacity-[0.1] blur-[90px] rounded-full -z-10" />

          {/* 🎫 HEADER BANNER */}
          <div className="text-center mb-8 relative z-10">
            <h1 className="text-6xl font-black tracking-tighter bg-gradient-to-r from-white via-[#FFD700] to-white bg-clip-text text-transparent drop-shadow-[0_0_20px_rgba(255,140,0,0.8)] leading-tight cyber-font">
              SINGTO
            </h1>
            <p className="text-xl font-bold text-white tracking-widest uppercase italic mt-1">✧บุหรี่นอกราคาส่ง✧</p>
            <p className="text-[9px] tracking-[0.05em] text-orange-300 font-bold uppercase opacity-90 mt-1">

              | "𝓢𝓘𝓝𝓖𝓣𝓞° | คุณภาพเหนือระดับ สำหรับคนรักสายควัน
            </p>
          </div>

          {/* 🎛️ TAB NAVIGATION CONTROLLER */}
          <div className="flex gap-2 mb-6 relative z-10 w-full max-w-md">
            <button onClick={() => setActiveTab("tracking")} className={`flex-1 py-3 rounded-xl font-bold border border-white/10 transition-all ${activeTab === "tracking" ? "btn-active font-black" : "bg-white/5 text-gray-400"}`}>
              📦 ค้นหาพัสดุ
            </button>
            <button onClick={() => setActiveTab("command")} className={`flex-1 py-3 rounded-xl font-bold border border-white/10 transition-all ${activeTab === "command" ? "btn-active font-black" : "bg-white/5 text-gray-400"}`}>
              ⚡ COMMAND CENTER
            </button>
          </div>

          {/* 🗳️ VIEW CONTAINER */}
          <div className="w-full max-w-md relative z-10">
            
            {/* 🛠️ VIEW 1: หน้าค้นหาพัสดุสำหรับลูกค้า (กรอกปั๊บเด้งปั๊บ รองรับเบอร์วิบัติ) */}
            {activeTab === "tracking" && (
              <div className="space-y-6">
                <div className="space-y-4">
                  <input 
                    type="tel" 
                    value={phoneInput}
                    onChange={(e) => setPhoneInput(e.target.value)}
                    placeholder="กรอกเบอร์โทรศัพท์ (มีขีด/เว้นวรรคได้)" 
                    className="w-full p-5 text-center text-2xl bg-white/5 backdrop-blur-xl border border-white/20 rounded-2xl outline-none focus:border-[#FF6600] text-white transition-all font-mono" 
                  />
                  <button onClick={handleSearch} className="relative w-full py-5 rounded-2xl font-black text-xl text-white overflow-hidden shadow-2xl transition-transform active:scale-95 group">
                    <div className="absolute inset-0 neon-border" />
                    <span className="relative z-10 tracking-widest">{loading ? "กำลังขุดข้อมูล..." : "เช็คเลขพัสดุ"}</span>
                  </button>
                </div>

                {/* แผงแสดงผลลัพธ์ (เด้งขึ้นมาเมื่อเจอข้อมูล) */}
                {trackingData && (
                  <div className="space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div className="p-[2px] rounded-2xl overflow-hidden shadow-[0_0_20px_rgba(255,102,0,0.4)] relative">
                      <div className="absolute inset-0 neon-border" />
                      <div className="relative bg-[#1A1100]/95 backdrop-blur-xl p-5 rounded-[14px] text-center">
                        <span className="text-xs text-orange-400 font-black uppercase tracking-[0.2em] neon-glow">คุณคือลูกค้า VIP</span>
                        <h2 className="text-3xl text-white font-black uppercase tracking-tight mt-1 leading-tight">
                          {cleanName(trackingData.customer)}
                        </h2>
                        {trackingData.is_phone_valid === false && (
                          <p className="text-[10px] text-red-400 mt-2 font-bold animate-pulse">⚠️ เบอร์โทรศัพท์ในระบบไม่สมบูรณ์ โปรดแจ้งแอดมินเพื่อแก้ไข</p>
                        )}
                      </div>
                    </div>

                    {/* ช่องกดคัดลอกเลขพัสดุ */}
                    <div onClick={() => { navigator.clipboard.writeText(trackingData.track); setCopied(true); setTimeout(() => setCopied(false), 2000); }}
